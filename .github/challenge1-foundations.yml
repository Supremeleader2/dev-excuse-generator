name: CI Pipeline
on:
  push:
    branches: [main]  

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Install dependencies
        run: npm install
      - name: Run linter
        run: npm run lint
      - name: Check formatting
        run: npm run format:check